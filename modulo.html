<title>NANU — Módulo</title>
<style>
:root{
  --bg1:#5a2aa8;
  --bg2:#3b2db2;
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.72);
  --accent:#ff4fd8;
  --radius:22px;
  --shadow:0 20px 60px rgba(0,0,0,.22);
  --glass:rgba(255,255,255,.10);
  --stroke:rgba(255,255,255,.16);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:ui-rounded,system-ui,-apple-system,Segoe UI,Roboto,Arial}
body{
  color:var(--text);
  background:
    radial-gradient(1000px 700px at 20% 10%,rgba(255,255,255,.10),transparent 55%),
    radial-gradient(900px 700px at 85% 20%,rgba(255,255,255,.08),transparent 60%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  overflow-x:hidden;
}

.bg-orbs{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}
.orb{
  position:absolute;
  border-radius:999px;
  opacity:.14;
  mix-blend-mode:screen;
  will-change:transform;
  background:
    radial-gradient(circle at 30% 30%,rgba(255,255,255,.65),rgba(255,255,255,0) 60%),
    radial-gradient(circle at 70% 70%,rgba(255,255,255,.35),rgba(255,255,255,0) 55%);
  box-shadow:0 0 60px rgba(255,255,255,.08);
  animation:float 10s ease-in-out infinite;
}
.orb.c1{background:radial-gradient(circle at 30% 30%,rgba(255,82,182,.70),rgba(255,255,255,0) 60%),radial-gradient(circle at 70% 70%,rgba(255,255,255,.25),rgba(255,255,255,0) 55%)}
.orb.c2{background:radial-gradient(circle at 30% 30%,rgba(64,214,255,.75),rgba(255,255,255,0) 60%),radial-gradient(circle at 70% 70%,rgba(255,255,255,.25),rgba(255,255,255,0) 55%)}
.orb.c3{background:radial-gradient(circle at 30% 30%,rgba(142,255,98,.70),rgba(255,255,255,0) 60%),radial-gradient(circle at 70% 70%,rgba(255,255,255,.25),rgba(255,255,255,0) 55%)}
@keyframes float{
  0%,100%{transform:translate3d(var(--x1),var(--y1),0) scale(1)}
  50%{transform:translate3d(var(--x2),var(--y2),0) scale(1.06)}
}

.topbar{
  position:sticky;
  top:0;
  z-index:5;
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  backdrop-filter:blur(14px);
  background:linear-gradient(180deg,rgba(20,8,60,.50),rgba(20,8,60,.16));
  border-bottom:1px solid rgba(255,255,255,.10);
}
.brand-mini{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);
  cursor:pointer;
  user-select:none;
}
.logo-mini{
  width:34px;height:34px;border-radius:12px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.12);
  overflow:hidden;
}
.logo-mini img{width:100%;height:100%;object-fit:cover;display:block}
.brand-mini .name{font-weight:950;letter-spacing:.4px;line-height:1}
.brand-mini .sub{font-size:12px;color:var(--muted);font-weight:800;margin-top:2px}

.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{
  padding:10px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.92);
  font-weight:950;
  cursor:pointer;
  transition:transform .14s ease, background .14s ease, border-color .14s ease;
}
.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.20)}
.btn:active{transform:translateY(1px)}
.btn.primary{
  background:rgba(255,255,255,.92);
  color:rgba(40,10,90,.95);
  border:none;
}
.btn.primary span{color:var(--accent)}

.wrap{
  position:relative;
  z-index:1;
  width:min(1100px,94vw);
  margin:22px auto 80px;
  display:grid;
  grid-template-columns:1.05fr .95fr;
  gap:18px;
  align-items:start;
}
.glass{
  border-radius:var(--radius);
  background:var(--glass);
  border:1px solid var(--stroke);
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
}
.hero{
  padding:22px 20px;
}
.kicker{
  display:flex;
  align-items:center;
  gap:10px;
  color:rgba(255,255,255,.86);
  font-weight:950;
}
.dot{width:10px;height:10px;border-radius:999px;box-shadow:0 0 18px rgba(255,255,255,.18)}
.d-pink{background:rgba(255,82,182,.95)}
.d-cyan{background:rgba(64,214,255,.95)}
.d-green{background:rgba(142,255,98,.95)}
.d-yellow{background:rgba(255,222,89,.95)}
.d-purple{background:rgba(190,120,255,.95)}
.d-teal{background:rgba(90,255,220,.95)}

h1{margin:10px 0 8px;font-size:clamp(30px,3.2vw,44px);letter-spacing:.2px}
.subline{margin:0;color:rgba(255,255,255,.78);font-weight:850;line-height:1.55}

.kpis{margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi{padding:12px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14)}
.kpi b{display:block;font-size:14px;letter-spacing:.2px}
.kpi span{display:block;font-size:12px;color:rgba(255,255,255,.75);font-weight:800;margin-top:4px}

.tabs{
  margin-top:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.tab{
  padding:10px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.90);
  font-weight:950;
  cursor:pointer;
  transition:transform .14s ease, background .14s ease, border-color .14s ease;
  user-select:none;
}
.tab:hover{transform:translateY(-1px);background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.20)}
.tab.active{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.26)}
.tab:active{transform:translateY(1px)}

.panel{
  margin-top:12px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);
}
.p{margin:0;color:rgba(255,255,255,.82);font-weight:800;line-height:1.65}
.panel ul{margin:12px 0 0;padding-left:18px}
.panel li{margin:8px 0;color:rgba(255,255,255,.82);font-weight:800;line-height:1.45}

.media{
  overflow:hidden;
}
.media-head{
  padding:14px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  border-bottom:1px solid rgba(255,255,255,.12);
}
.media-head b{font-size:14px;letter-spacing:.2px}
.media-body{padding:14px 14px 18px}
.video{
  width:100%;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.14);
  overflow:hidden;
  background:rgba(0,0,0,.18);
}
.video iframe{width:100%;height:330px;border:0;display:block}
.video video{width:100%;height:auto;display:block}

.gallery{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.shot{
  border-radius:18px;
  border:1px solid rgba(255,255,255,.14);
  overflow:hidden;
  background:rgba(255,255,255,.06);
  aspect-ratio:16/10;
  display:grid;
  place-items:center;
  font-weight:950;
  color:rgba(255,255,255,.82);
}
.shot img{width:100%;height:100%;object-fit:cover;display:block}

@media (max-width:980px){
  .wrap{grid-template-columns:1fr}
  .kpis{grid-template-columns:1fr}
  .video iframe{height:220px}
  .gallery{grid-template-columns:1fr}
}
</style>
</head>

const params=new URLSearchParams(location.search)
const fallbackId=params.get("id")||"senales"
const id=(() => {
  const file=(location.pathname.split("/").pop()||"").toLowerCase()
  const mapByFile={
    "senales.html":"senales",
    "logica.html":"logica",
    "camin.html":"camin",
    "dali.html":"dali",
    "eco.html":"eco",
    "trazos.html":"trazos"
  }
  return mapByFile[file] || fallbackId
})()

const title=document.getElementById("title")
const subtitle=document.getElementById("subtitle")
const kickerText=document.getElementById("kickerText")
const dot=document.getElementById("dot")
const kpis=document.getElementById("kpis")
const tabs=document.getElementById("tabs")
const panel=document.getElementById("panel")
const gallery=document.getElementById("gallery")
const videoWrap=document.getElementById("videoWrap")
const videoLabel=document.getElementById("videoLabel")
const videoHint=document.getElementById("videoHint")

function setActiveTab(key){
  tabs.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===key))
}

function fillPanel(mod,key){
  const c=mod.tabs[key]
  const items=(c.items||[]).map(x=>`<li>${x}</li>`).join("")
  panel.innerHTML=`<p class="p">${c.p||""}</p><ul>${items}</ul>`
}

function fillKpis(mod){
  kpis.innerHTML=""
  mod.kpis.forEach(x=>{
    const d=document.createElement("div")
    d.className="kpi"
    d.innerHTML=`<b>${x.b}</b><span>${x.s}</span>`
    kpis.appendChild(d)
  })
}

function fillGallery(mod){
  gallery.innerHTML=""
  const imgs=(mod.gallery||[]).filter(Boolean)
  if(!imgs.length){
    const d=document.createElement("div")
    d.className="shot"
    d.textContent="Foto pendiente"
    d.style.gridColumn="1 / -1"
    gallery.appendChild(d)
    return
  }
  imgs.forEach(src=>{
    const d=document.createElement("div")
    d.className="shot"
    const img=document.createElement("img")
    img.src=src
    img.alt=""
    img.onerror=()=>{d.textContent="Foto pendiente"}
    d.appendChild(img)
    gallery.appendChild(d)
  })
}

function fillVideo(mod){
  videoWrap.innerHTML=""
  videoLabel.textContent="Opcional"
  videoHint.style.display="block"
  if(!mod.video||mod.video.type==="none"){
    videoWrap.innerHTML=`<div style="padding:18px;color:rgba(255,255,255,.80);font-weight:900;line-height:1.5">Video no asignado. Puedes agregar un .mp4 en assets o un embed de YouTube/Vimeo.</div>`
    return
  }
  if(mod.video.type==="local"){
    videoLabel.textContent="Archivo local"
    videoWrap.innerHTML=`<video controls playsinline preload="metadata"><source src="${mod.video.src}" type="video/mp4"></video>`
    return
  }
  if(mod.video.type==="youtube"){
    videoLabel.textContent="YouTube"
    videoHint.style.display="none"
    videoWrap.innerHTML=`<iframe src="${mod.video.src}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`
    return
  }
}

function loadModule(mid){
  const mod=DATA.find(x=>x.id===mid)||DATA[0]
  document.title=`NANU — ${mod.name}`
  title.textContent=mod.name
  subtitle.textContent=mod.subtitle
  kickerText.textContent=mod.kicker
  dot.className=`dot ${mod.dot}`
  fillKpis(mod)
  fillGallery(mod)
  const key=tabs.querySelector(".tab.active")?.dataset.tab || "que"
  fillPanel(mod,key)
  fillVideo(mod)
  return mod
}

let current=loadModule(id)

tabs.addEventListener("click",(e)=>{
  const t=e.target.closest(".tab")
  if(!t)return
  const key=t.dataset.tab
  setActiveTab(key)
  fillPanel(current,key)
})

function nav(delta){
  const idx=DATA.findIndex(x=>x.id===current.id)
  const next=DATA[(idx+delta+DATA.length)%DATA.length]
  location.href = ROUTES[next.id] || "NANU.html"
}

document.getElementById("prevBtn").addEventListener("click",()=>nav(-1))
document.getElementById("nextBtn").addEventListener("click",()=>nav(1))

const backHome=document.getElementById("backHome")
backHome.addEventListener("click",()=>{location.href=HOME})
backHome.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"||e.key===" "){e.preventDefault();location.href=HOME}
})
</script>
